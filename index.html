<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./css/tokens.css">
<link rel="stylesheet" href="./css/styles.css">
</head>

<body>

<main>

<section aria-label="Current weather">

<header>
<h1>Monday</h1>
<p><time datetime="2022-06-20">20 Jun 2022</time></p>
</header>

<div>
<img src="./assets/icons/sun.svg" alt="Sunny weather icon">
<p>29°C</p>
<p>Sunny</p>
</div>

</section>

<section aria-label="Weather details and forecast">

<header>

<h2>Weather details</h2>

<dl>
<div>
<dt>Precipitation</dt>
<dd>0%</dd>
</div>

<div>
<dt>Humidity</dt>
<dd>42%</dd>
</div>

<div>
<dt>Wind</dt>
<dd>3 km/h</dd>
</div>
</dl>

</header>

<section aria-label="Additional weather highlights">

<article>
<h3>UV Index</h3>
<p>0</p>
<p>Low</p>
</article>

<article>
<h3><time datetime="2026-02-24">Tuesday, Feb 24th 2026</time></h3>

<p>
<img src="./assets/icons/arrowup.svg" alt="">
<span>32°C</span>
</p>

<p>
<img src="./assets/icons/arrowdown.svg" alt="">
<span>24°C</span>
</p>

</article>

</section>

<section aria-label="Weekly forecast" class="forecast">

<h2>4-day forecast</h2>

<article class="forecast-day" aria-current="true" tabindex="0">

<img class="icon-light" src="./assets/icons/sun.svg" alt="">
<img class="icon-dark" src="./assets/icons/darksun.svg" alt="">

<h3>Tue</h3>
<p>30°C</p>

</article>

<article class="forecast-day" tabindex="0">

<img class="icon-light" src="./assets/icons/cloud-sun.svg" alt="">
<img class="icon-dark" src="./assets/icons/darkcloudsun.svg" alt="">

<h3>Wed</h3>
<p>22°C</p>

</article>

<article class="forecast-day" tabindex="0">

<img class="icon-light" src="./assets/icons/cloud-rain.svg" alt="">
<img class="icon-dark" src="./assets/icons/darkcloudrain.svg" alt="">

<h3>Thu</h3>
<p>06°C</p>

</article>

<article class="forecast-day" tabindex="0">

<img class="icon-light" src="./assets/icons/sun.svg" alt="">
<img class="icon-dark" src="./assets/icons/darksun.svg" alt="">

<h3>Fri</h3>
<p>26°C</p>

</article>

</section>

<footer>

<p>
<img src="./assets/icons/location.svg" alt="">
<span>New York City</span>
</p>

</footer>

</section>

</main>

<script>

const days = document.querySelectorAll(".forecast-day");

days.forEach(day => {

day.addEventListener("click", () => {

days.forEach(d => d.removeAttribute("aria-current"));
day.setAttribute("aria-current","true");

});

});

</script>

</body>
</html>
